# 简化的测试配置文件
spring:
  application:
    name: gb28181-simple-test
  profiles:
    active: test

# 基础配置
test:
  mode: verify
  suite: basic
  verbose: true

# 日志配置
logging:
  level:
    io.github.lunasaw.gbproxy.test: INFO
    org.springframework: WARN
    root: INFO
  pattern:
    console: "[%d{HH:mm:ss.SSS}] %-5level [%logger{36}] - %msg%n"

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always