# GB28181测试模块配置
spring:
  application:
    name: gb28181-test
  profiles:
    active: test

# 测试套件配置
test:
  mode: auto                    # 测试模式: auto/manual
  suite: all                    # 测试套件: all/server/client/integration
  concurrent: false             # 是否并发执行测试
  report: true                  # 是否生成测试报告
  timeout: 30                   # 测试超时时间(秒)
  retry-count: 3                # 测试重试次数
  interval: 1000                # 测试间隔时间(毫秒)
  continue-on-failure: true     # 测试失败时是否继续
  output-dir: target/test-results  # 测试结果输出目录
  verbose: true                 # 是否输出详细日志
  test-data-dir: src/test/resources/test-data     # 测试数据目录
  scenario-dir: src/test/resources/test-scenarios  # 测试场景配置目录


# SIP协议配置
sip:
  common:
    # 时间同步配置
    time-sync:
      enabled: true                    # 是否启用时间同步
      mode: BOTH                       # 时间同步方式: SIP, NTP, BOTH
      offset-threshold: 1000           # 时间偏差阈值(毫秒)
      ntp-server: "pool.ntp.org"       # NTP服务器地址
      ntp-sync-interval: 3600          # NTP校时间隔(秒)
      register-expire-on-error: 36000  # 时间偏差较大时的注册过期时间(秒)
      auto-adjust-expire: true         # 是否自动调整注册过期时间

  # SIP相关配置

  server:
    enabled: true
    ip: "127.0.0.1"
    port: 5060
    maxDevices: 100
    deviceTimeout: 5m
    enableTcp: false
    enableUdp: true
    domain: "34020000002000000001"
    serverId: "34020000002000000001"
    serverName: "GB28181-Server"
    username: "admin"
    password: "12345678"
    realm: 34020000


  client:
    enabled: true
    domain: 127.0.0.1
    keepAliveInterval: 1m
    maxRetries: 3
    retryDelay: 5s
    registerExpires: 3600
    clientId: "34020000001320000001"
    clientName: "GB28181-Client"
    port: 5061

# sip-gateway 节点配置（参考 LAYERED-ARCHITECTURE.md §6.5）
# 单机部署：保持 nodes 留空即可。
# 多节点部署：填入所有 sip-gateway 节点的内网地址，
#            其中本节点 nodeId 必须与 nodes 中的 key 之一一致。
gateway:
  node-id: node-default
  invite-context-ttl-ms: 30000
  invite-idempotency-window-ms: 60000
  # nodes:
  #   node-1: http://10.0.0.1:8080
  #   node-2: http://10.0.0.2:8080

# 日志配置
logging:
  level:
    io.github.lunasaw: DEBUG
    io.github.lunasaw.gbproxy.test: INFO
    gov.nist.javax.sip: WARN
    org.springframework: INFO
    root: INFO
  pattern:
    console: "[%d{HH:mm:ss.SSS}] [%thread] %-5level [%logger{36}] - %msg%n"
    file: "[%d{yyyy-MM-dd HH:mm:ss.SSS}] [%thread] %-5level [%logger{50}] - %msg%n"
  file:
    name: logs/gb28181-test.log
    max-size: 100MB
    max-history: 30

# 管理端点配置(用于健康检查和指标收集)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true