# GB28181测试模块配置
spring:
  application:
    name: gb28181-test
  profiles:
    active: test

# 测试套件配置
test:
  mode: auto                    # 测试模式: auto/manual
  suite: all                    # 测试套件: all/server/client/integration
  concurrent: false             # 是否并发执行测试
  report: true                  # 是否生成测试报告
  timeout: 30                   # 测试超时时间(秒)
  retry-count: 3                # 测试重试次数
  interval: 1000                # 测试间隔时间(毫秒)
  continue-on-failure: true     # 测试失败时是否继续
  output-dir: target/test-results  # 测试结果输出目录
  verbose: true                 # 是否输出详细日志
  test-data-dir: src/test/resources/test-data     # 测试数据目录
  scenario-dir: src/test/resources/test-scenarios  # 测试场景配置目录


# GB28181协议配置
gb28181:
  # 服务端配置
  server:
    device:
      domain: 127.0.0.1
      server-id: "41010500002000000001"
      server-name: "GB28181-Server-Test"
    auth:
      enable: true
      realm: "44050100"
      username: "admin"
      password: "123456"
    timeout:
      register: 60
      heartbeat: 30
      invite: 30

  # 客户端配置
  client:
    device:
      domain: 127.0.0.1
      device-id: "33010602011187000001"
      device-name: "GB28181-Client-Test"
      manufacturer: "TestManufacturer"
      model: "TestModel"
      firmware: "V1.0.0"
    auth:
      username: "admin"
      password: "123456"
    timeout:
      register-expires: 3600
      keepalive-interval: 60

# 日志配置
logging:
  level:
    io.github.lunasaw: DEBUG
    io.github.lunasaw.gbproxy.test: INFO
    gov.nist.javax.sip: WARN
    org.springframework: INFO
    root: INFO
  pattern:
    console: "[%d{HH:mm:ss.SSS}] [%thread] %-5level [%logger{36}] - %msg%n"
    file: "[%d{yyyy-MM-dd HH:mm:ss.SSS}] [%thread] %-5level [%logger{50}] - %msg%n"
  file:
    name: logs/gb28181-test.log
    max-size: 100MB
    max-history: 30

# 管理端点配置(用于健康检查和指标收集)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true