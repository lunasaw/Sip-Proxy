# SIP代理测试配置文件
# 用于单元测试的配置 - 简化版本

# SIP协议配置
sip:
  common:
    # 时间同步配置
    time-sync:
      enabled: true                    # 是否启用时间同步
      mode: BOTH                       # 时间同步方式: SIP, NTP, BOTH
      offset-threshold: 1000           # 时间偏差阈值(毫秒)
      ntp-server: "pool.ntp.org"       # NTP服务器地址
      ntp-sync-interval: 3600          # NTP校时间隔(秒)
      register-expire-on-error: 36000  # 时间偏差较大时的注册过期时间(秒)
      auto-adjust-expire: true         # 是否自动调整注册过期时间

  # SIP相关配置

  server:
    enabled: true
    ip: "127.0.0.1"
    port: 5060
    maxDevices: 100
    deviceTimeout: 5m
    enableTcp: false
    enableUdp: true
    domain: "34020000002000000001"
    serverId: "34020000002000000001"
    serverName: "GB28181-Server"
    username: "admin"
    password: "12345678"
    realm: 34020000


  client:
    enabled: true
    keepAliveInterval: 1m
    maxRetries: 3
    retryDelay: 5s
    registerExpires: 3600
    clientId: "34020000001320000001"
    clientName: "GB28181-Client"
    domain: "127.0.0.1"
    port: 5061

  # 连接池配置 - 简化配置
  pool:
    enabled: false
    maxConnections: 10
    coreConnections: 2
    maxIdleConnections: 1
    connectionTimeoutMillis: 5000
    idleTimeoutMillis: 60000
    validationIntervalMillis: 30000
    testOnBorrow: false
    testOnReturn: false
    testWhileIdle: false
    cleanupIntervalMillis: 60000
    enableStatistics: false
    forceCleanupOnShutdown: true
    maxWaitMillis: 5000
    validationQuery: "OPTIONS"
# Spring配置
spring:
  main:
    allow-bean-definition-overriding: true
    banner-mode: off
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# 日志配置 - 确保测试输出可见
logging:
  level:
    io.github.lunasaw.sip: DEBUG
    io.github.lunasaw.gbproxy: DEBUG
    io.github.lunasaw.gbproxy.test: DEBUG
    org.springframework: INFO
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/sip-proxy-test.log