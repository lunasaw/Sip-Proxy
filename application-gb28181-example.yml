# GB28181配置示例文件
# 展示拆分后的client和server配置结构

sip:
  gb28181:
    # 通用配置（在sip-common模块中）
    performance:
      message-queue-size: 1000
      thread-pool-size: 200
      enable-metrics: true
      enable-async: true
      batch-size: 100
      processing-timeout-ms: 5000
      slow-query-threshold-ms: 100

    cache:
      device-max-size: 50000
      device-expire-after-write: 2h
      device-expire-after-access: 30m
      subscribe-max-size: 5000
      subscribe-expire-after-write: 5m
      subscribe-expire-after-access: 2m
      transaction-max-size: 2000
      transaction-expire-after-write: 1m
      message-max-size: 10000
      message-expire-after-write: 30m
      message-expire-after-access: 15m
      enable-stats: true

    # 客户端配置（在gb28181-client模块中）
    client:
      keep-alive-interval: 1m
      max-retries: 3
      retry-delay: 5s
      register-expires: 3600
      client-id: "34020000001320000001"
      client-name: "GB28181-Client"
      username: "admin"
      password: "123456"
      # 客户端性能配置
      performance:
        message-queue-size: 1000
        thread-pool-size: 200
        enable-metrics: true
        enable-async: true
        batch-size: 100
        processing-timeout-ms: 5000
        slow-query-threshold-ms: 100
      # 客户端缓存配置
      cache:
        device-max-size: 50000
        device-expire-after-write: 2h
        device-expire-after-access: 30m
        subscribe-max-size: 5000
        subscribe-expire-after-write: 5m
        subscribe-expire-after-access: 2m
        transaction-max-size: 2000
        transaction-expire-after-write: 1m
        message-max-size: 10000
        message-expire-after-write: 30m
        message-expire-after-access: 15m
        enable-stats: true

    # 服务端配置（在gb28181-server模块中）
    server:
      ip: "0.0.0.0"
      port: 5060
      max-devices: 10000
      device-timeout: 5m
      enable-tcp: true
      enable-udp: true
      domain: "34020000002000000001"
      server-id: "34020000002000000001"
      server-name: "GB28181-Server"
      # 服务端性能配置
      performance:
        message-queue-size: 1000
        thread-pool-size: 200
        enable-metrics: true
        enable-async: true
        batch-size: 100
        processing-timeout-ms: 5000
        slow-query-threshold-ms: 100
      # 服务端缓存配置
      cache:
        device-max-size: 50000
        device-expire-after-write: 2h
        device-expire-after-access: 30m
        subscribe-max-size: 5000
        subscribe-expire-after-write: 5m
        subscribe-expire-after-access: 2m
        transaction-max-size: 2000
        transaction-expire-after-write: 1m
        message-max-size: 10000
        message-expire-after-write: 30m
        message-expire-after-access: 15m
        enable-stats: true